name: Deploy to Cloudflare Pages

on:
  workflow_dispatch: # Restricts the workflow to manual triggers only

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Build
        id: build
        run: npm run build

      # schema.sql itself only CREATE TABLE/INDEX IF NOT EXISTS, which is safe to
      # re-run against a table that already has every column it expects - but it
      # can't add a column to a table that predates that column (SQLite has no
      # "ALTER TABLE ADD COLUMN IF NOT EXISTS"). This step covers that gap so a
      # new column added to the schema doesn't require a separate manual CLI step
      # before deploying: it's tolerant of the two expected non-error outcomes
      # ("duplicate column name" - already applied; "no such table" - brand new
      # database, schema.sql below will create it with the column already in
      # place) and only fails the job for a genuinely unexpected error.
      #
      # Any future migration that only adds columns can follow this same pattern:
      # add a step here that runs it with the same tolerant grep before the
      # schema.sql step.
      - name: Apply pending column migrations
        id: migrate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          OUTPUT=$(npx --yes wrangler@4 d1 execute vantagesolutions-contacts --remote --file=./migrate_v3_dedup.sql 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ] && ! echo "$OUTPUT" | grep -qiE "duplicate column name|no such table"; then
            echo "::error::migrate_v3_dedup.sql failed for a reason other than 'already applied' or 'fresh database' — stopping deploy."
            exit 1
          fi
          exit 0

      # schema.sql uses CREATE TABLE/INDEX IF NOT EXISTS throughout, so this is
      # always safe to re-run - it never touches existing data. Requires the
      # "vantagesolutions-contacts" D1 database to already exist and be bound
      # to this Pages project (Cloudflare dashboard -> Settings -> Functions).
      - name: Apply contacts database schema
        id: schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 d1 execute vantagesolutions-contacts --remote --file=./schema.sql

      - name: Ensure Cloudflare Pages Project Exists
        id: create-project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Attempts to create the project. 
          # The '|| true' ensures that if the project already exists (which returns an error), 
          # the pipeline won't crash and will gracefully move on to deployment.
          npx wrangler pages project create vantage-solutions --production-branch main || true

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vantage-solutions
          directory: .svelte-kit/cloudflare
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Write job summary
        if: always()
        env:
          INSTALL_OUT: ${{ steps.install.outcome }}
          BUILD_OUT:   ${{ steps.build.outcome }}
          DEPLOY_OUT:  ${{ steps.deploy.outcome }}
          DEPLOY_URL:  ${{ steps.deploy.outputs.url }}
          ALIAS_URL:   ${{ steps.deploy.outputs.alias }}
          RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          icon() {
            case "$1" in
              success) echo "✅" ;;
              skipped) echo "⏭️" ;;
              *)        echo "❌" ;;
            esac
          }
          {
            echo "# 🚀 Deploy — Vantage Solutions"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`  |  **Ref:** \`${{ github.ref_name }}\`  |  **Triggered by:** ${{ github.actor }}"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| 📦 Install  | $(icon $INSTALL_OUT) \`$INSTALL_OUT\` |"
            echo "| 🔨 Build    | $(icon $BUILD_OUT) \`$BUILD_OUT\` |"
            echo "| ☁️  Deploy   | $(icon $DEPLOY_OUT) \`$DEPLOY_OUT\` |"
            echo ""
            if [[ "$DEPLOY_OUT" == "success" ]]; then
              echo "## 🌐 Live URLs"
              echo ""
              if [[ -n "$DEPLOY_URL" ]]; then
                echo "- **Preview:** $DEPLOY_URL"
              fi
              if [[ -n "$ALIAS_URL" ]]; then
                echo "- **Alias:** $ALIAS_URL"
              fi
              echo ""
              echo "> ✅ **Deployment successful.**"
            else
              echo "> ❌ **Deployment failed.** See full logs: $RUN_URL"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
